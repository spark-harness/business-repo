name: fides-bff CI

on:
  push:
    paths:
      - "packages/bffkit/**"
      - "services/backend/fides-bff/**"
      - ".github/workflows/fides-bff-ci.yml"
  pull_request:
    paths:
      - "packages/bffkit/**"
      - "services/backend/fides-bff/**"
      - ".github/workflows/fides-bff-ci.yml"

defaults:
  run:
    working-directory: services/backend/fides-bff

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/backend/fides-bff/go.mod
          cache-dependency-path: services/backend/fides-bff/go.sum

      - name: Configure private Go modules
        env:
          IDL_GO_REPO_TOKEN: ${{ secrets.IDL_GO_REPO_TOKEN || secrets.BRANCH_COHERENCE_TOKEN || github.token }}
        run: |
          if [ -z "$IDL_GO_REPO_TOKEN" ]; then
            echo "::error::Missing token with read access to spark-harness/idl-go-repo."
            exit 1
          fi
          git config --global url."https://x-access-token:${IDL_GO_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/spark-harness/*" >> "$GITHUB_ENV"
          echo "GONOSUMDB=github.com/spark-harness/*" >> "$GITHUB_ENV"

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/backend/fides-bff/go.mod
          cache-dependency-path: services/backend/fides-bff/go.sum

      - name: Configure private Go modules
        env:
          IDL_GO_REPO_TOKEN: ${{ secrets.IDL_GO_REPO_TOKEN || secrets.BRANCH_COHERENCE_TOKEN || github.token }}
        run: |
          if [ -z "$IDL_GO_REPO_TOKEN" ]; then
            echo "::error::Missing token with read access to spark-harness/idl-go-repo."
            exit 1
          fi
          git config --global url."https://x-access-token:${IDL_GO_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/spark-harness/*" >> "$GITHUB_ENV"
          echo "GONOSUMDB=github.com/spark-harness/*" >> "$GITHUB_ENV"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: services/backend/fides-bff

  bffkit:
    name: bffkit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/bffkit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/bffkit/go.mod
          cache-dependency-path: packages/bffkit/go.sum

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: packages/bffkit
