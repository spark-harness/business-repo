name: fides-bff CI

on:
  push:
    paths:
      - "services/backend/fides-bff/**"
      - ".github/workflows/fides-bff-ci.yml"
  pull_request:
    paths:
      - "services/backend/fides-bff/**"
      - ".github/workflows/fides-bff-ci.yml"

defaults:
  run:
    working-directory: services/backend/fides-bff

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/backend/fides-bff/go.mod
          cache-dependency-path: services/backend/fides-bff/go.sum

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/backend/fides-bff/go.mod
          cache-dependency-path: services/backend/fides-bff/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          working-directory: services/backend/fides-bff
