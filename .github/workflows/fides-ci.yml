name: fides-ci

# 前端 fides 的 Clean Architecture 依赖门禁（LEN-31）。
# 仅当 fides 改动时触发；pnpm lint:deps 违规即失败、阻断合并（承接 LEN-4 AC5/AC6）。

on:
  push:
    paths:
      - "services/frontend/fides/**"
      - ".github/workflows/fides-ci.yml"
  pull_request:
    paths:
      - "services/frontend/fides/**"
      - ".github/workflows/fides-ci.yml"

# 仅做静态门禁检查，最小权限：只读仓库内容。
permissions:
  contents: read

defaults:
  run:
    working-directory: services/frontend/fides

jobs:
  lint-deps:
    name: Clean Architecture 依赖门禁
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/frontend/fides/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency-cruiser gate
        run: pnpm lint:deps
