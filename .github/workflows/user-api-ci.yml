name: user-api-ci

on:
  push:
    paths:
      - "services/backend/user-api/**"
      - ".github/workflows/user-api-ci.yml"
  pull_request:
    paths:
      - "services/backend/user-api/**"
      - ".github/workflows/user-api-ci.yml"

permissions:
  contents: read
  packages: read

defaults:
  run:
    working-directory: services/backend/user-api

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout generated Java contracts
        uses: actions/checkout@v4
        with:
          repository: spark-harness/idl-java-repo
          path: .idl-java-repo

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install generated Java contracts
        working-directory: .idl-java-repo
        run: mvn -B install -DskipTests

      - name: Install Spring clean architecture starter
        working-directory: packages/spring-starter
        run: mvn -B install -DskipTests

      - name: Run tests
        run: mvn test
