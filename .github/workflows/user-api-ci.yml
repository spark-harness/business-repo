name: user-api-ci

on:
  push:
    paths:
      - "services/backend/user-api/**"
      - ".github/workflows/user-api-ci.yml"
  pull_request:
    paths:
      - "services/backend/user-api/**"
      - ".github/workflows/user-api-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: services/backend/user-api

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn test
