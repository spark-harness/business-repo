name: user-api-ci

on:
  push:
    paths:
      - "services/backend/user-api/**"
      - ".github/workflows/user-api-ci.yml"
  pull_request:
    paths:
      - "services/backend/user-api/**"
      - ".github/workflows/user-api-ci.yml"

permissions:
  contents: read
  packages: read

defaults:
  run:
    working-directory: services/backend/user-api

env:
  MAVEN_GITHUB_TOKEN: ${{ secrets.BRANCH_COHERENCE_TOKEN || github.token }}

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: MAVEN_GITHUB_TOKEN

      - name: Run tests
        run: mvn test
