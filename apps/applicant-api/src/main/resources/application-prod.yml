spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2s}

management:
  health:
    db:
      enabled: false
    redis:
      enabled: true

otel:
  service:
    name: applicant-api
  propagators: tracecontext,baggage
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:0.1}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      traces:
        protocol: http/protobuf
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:}
        headers: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:}

spark:
  applicant:
    auth:
      runtime-store: ${SPARK_APPLICANT_AUTH_RUNTIME_STORE:redis-jdbc}
      otp-provider: ${SPARK_APPLICANT_AUTH_OTP_PROVIDER:disabled}
      token-mode: ${SPARK_APPLICANT_AUTH_TOKEN_MODE:hmac}
      jdbc-url: ${SPARK_APPLICANT_AUTH_JDBC_URL:}
      jdbc-username: ${SPARK_APPLICANT_AUTH_JDBC_USERNAME:}
      jdbc-password: ${SPARK_APPLICANT_AUTH_JDBC_PASSWORD:}
      token-secret: ${SPARK_APPLICANT_AUTH_TOKEN_SECRET:}
      migrations-enabled: ${SPARK_APPLICANT_AUTH_MIGRATIONS_ENABLED:true}
      consul:
        enabled: ${SPARK_APPLICANT_AUTH_CONSUL_ENABLED:true}
        url: ${SPARK_APPLICANT_AUTH_CONSUL_URL:}
        service-name: ${SPARK_APPLICANT_AUTH_CONSUL_SERVICE_NAME:applicant-api}
        service-address: ${SPARK_APPLICANT_AUTH_CONSUL_SERVICE_ADDRESS:}
        http-port: ${SPARK_APPLICANT_AUTH_CONSUL_HTTP_PORT:8080}
        grpc-port: ${SPARK_APPLICANT_AUTH_CONSUL_GRPC_PORT:9090}
        health-check-url: ${SPARK_APPLICANT_AUTH_CONSUL_HEALTH_CHECK_URL:}
