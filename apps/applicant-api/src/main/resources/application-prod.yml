spring:
  cloud:
    consul:
      enabled: true
      config:
        enabled: true
  data:
    redis:
      host: ""
      port: 6379
      password: ""
      timeout: 2s

management:
  health:
    db:
      enabled: false
    redis:
      enabled: true

otel:
  service:
    name: applicant-api
  propagators: tracecontext,baggage
  traces:
    exporter: otlp
    sampler: parentbased_traceidratio
    sampler.arg: 0.1
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      traces:
        protocol: http/protobuf
        endpoint: ""
        headers: ""

spark:
  applicant:
    auth:
      runtime-store: redis-jdbc
      otp-provider: disabled
      token-mode: hmac
      jdbc-url: ""
      jdbc-username: ""
      jdbc-password: ""
      token-secret: ""
      migrations-enabled: true
      consul:
        enabled: true
        url: ""
        service-name: applicant-api
        service-address: ""
        http-port: 8080
        grpc-port: 9090
        health-check-url: ""
