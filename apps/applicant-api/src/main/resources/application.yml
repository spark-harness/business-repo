spring:
  application:
    name: applicant-api
  config:
    import:
      - "optional:file:.env[.properties]"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2s}

management:
  health:
    db:
      enabled: false
    redis:
      enabled: true

otel:
  service:
    name: applicant-api
  propagators: tracecontext,baggage
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:0.0}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      traces:
        protocol: http/protobuf
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:}
        headers: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:}

spark:
  applicant:
    auth:
      runtime-store: ${SPARK_APPLICANT_AUTH_RUNTIME_STORE:redis-jdbc}
      otp-provider: ${SPARK_APPLICANT_AUTH_OTP_PROVIDER:test}
      token-mode: ${SPARK_APPLICANT_AUTH_TOKEN_MODE:hmac}
      jdbc-url: ${SPARK_APPLICANT_AUTH_JDBC_URL:jdbc:postgresql://localhost:5432/app}
      jdbc-username: ${SPARK_APPLICANT_AUTH_JDBC_USERNAME:forest}
      jdbc-password: ${SPARK_APPLICANT_AUTH_JDBC_PASSWORD:}
      token-secret: ${SPARK_APPLICANT_AUTH_TOKEN_SECRET:}
      migrations-enabled: ${SPARK_APPLICANT_AUTH_MIGRATIONS_ENABLED:true}
      key-prefix: ${SPARK_APPLICANT_AUTH_KEY_PREFIX:applicant-api}
      consul:
        enabled: ${SPARK_APPLICANT_AUTH_CONSUL_ENABLED:true}
        url: ${SPARK_APPLICANT_AUTH_CONSUL_URL:http://localhost:8500}
        service-name: ${SPARK_APPLICANT_AUTH_CONSUL_SERVICE_NAME:applicant-api}
        service-address: ${SPARK_APPLICANT_AUTH_CONSUL_SERVICE_ADDRESS:127.0.0.1}
        http-port: ${SPARK_APPLICANT_AUTH_CONSUL_HTTP_PORT:8080}
        grpc-port: ${SPARK_APPLICANT_AUTH_CONSUL_GRPC_PORT:9090}
        health-check-url: ${SPARK_APPLICANT_AUTH_CONSUL_HEALTH_CHECK_URL:}
        health-check-path: ${SPARK_APPLICANT_AUTH_CONSUL_HEALTH_CHECK_PATH:/ready}
  grpc:
    server:
      port: ${SPARK_GRPC_SERVER_PORT:9090}
      principal:
        enabled: false
