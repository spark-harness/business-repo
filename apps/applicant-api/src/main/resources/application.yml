spring:
  application:
    name: applicant-api
  config:
    import:
      - "optional:consul:"
      - "optional:file:.env[.properties]"
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
        format: yaml
        watch:
          enabled: false
        name: applicant-api
  data:
    redis:
      host: localhost
      port: 6379
      password: forest_dev_password
      timeout: 2s

management:
  health:
    redis:
      enabled: true

otel:
  service:
    name: applicant-api
  propagators: tracecontext,baggage
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:0.0}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      traces:
        protocol: http/protobuf
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:}
        headers: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:}

spark:
  applicant:
    auth:
      runtime-store: redis-jdbc
      otp-provider: test
      token-mode: hmac
      jdbc-url: jdbc:postgresql://localhost:5432/app
      jdbc-username: forest
      jdbc-password: forest_dev_password
      token-secret: local-dev-token-secret
      migrations-enabled: true
      key-prefix: applicant-api
      consul:
        enabled: true
        url: http://localhost:8500
        service-name: applicant-api
        service-address: 127.0.0.1
        http-port: 8080
        grpc-port: 9090
        health-check-url: ""
        health-check-path: /ready
  grpc:
    server:
      port: 9090
      principal:
        enabled: false
