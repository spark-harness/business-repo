spring:
  application:
    name: quote-api
  config:
    import:
      - "optional:file:.env[.properties]"

management:
  health:
    db:
      enabled: false

otel:
  service:
    name: quote-api
  resource:
    attributes: ${OTEL_RESOURCE_ATTRIBUTES:deployment.environment=${SPRING_PROFILES_ACTIVE:local}}
  propagators: tracecontext,baggage
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:0.0}
  metrics:
    exporter: none
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:${OTEL_TRACES_EXPORTER:none}}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
      headers: ${OTEL_EXPORTER_OTLP_HEADERS:}
      traces:
        protocol: http/protobuf
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}}
        headers: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:${OTEL_EXPORTER_OTLP_HEADERS:}}
      logs:
        protocol: http/protobuf
        endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}}
        headers: ${OTEL_EXPORTER_OTLP_LOGS_HEADERS:${OTEL_EXPORTER_OTLP_HEADERS:}}

spark:
  quote:
    validity: 30m
    jdbc-url: ${QUOTE_JDBC_URL:jdbc:h2:mem:quote;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    jdbc-username: ${QUOTE_JDBC_USERNAME:sa}
    jdbc-password: ${QUOTE_JDBC_PASSWORD:}
    consul:
      enabled: ${SPARK_QUOTE_CONSUL_ENABLED:false}
      url: ${SPARK_QUOTE_CONSUL_URL:http://localhost:8500}
      service-name: ${SPARK_QUOTE_CONSUL_SERVICE_NAME:quote-api}
      service-address: ${SPARK_QUOTE_CONSUL_SERVICE_ADDRESS:127.0.0.1}
      http-port: ${SPARK_QUOTE_CONSUL_HTTP_PORT:8080}
      grpc-port: ${SPARK_QUOTE_CONSUL_GRPC_PORT:9090}
      health-check-url: ${SPARK_QUOTE_CONSUL_HEALTH_CHECK_URL:}
      health-check-path: ${SPARK_QUOTE_CONSUL_HEALTH_CHECK_PATH:/ready}
  grpc:
    server:
      port: ${SPARK_GRPC_SERVER_PORT:9090}
