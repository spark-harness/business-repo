spring:
  application:
    name: origination-api
  config:
    import:
      - "optional:file:.env[.properties]"

management:
  health:
    db:
      enabled: false

otel:
  service:
    name: origination-api
  resource:
    attributes: ${OTEL_RESOURCE_ATTRIBUTES:deployment.environment=${SPRING_PROFILES_ACTIVE:local}}
  propagators: tracecontext,baggage
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:0.0}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      traces:
        protocol: http/protobuf
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:}
        headers: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:}

spark:
  origination:
    jdbc-url: ${ORIGINATION_JDBC_URL:jdbc:h2:mem:origination;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    jdbc-username: ${ORIGINATION_JDBC_USERNAME:sa}
    jdbc-password: ${ORIGINATION_JDBC_PASSWORD:}
    quote-api-base-url: ${ORIGINATION_QUOTE_API_BASE_URL:http://localhost:8080}
    quote-api-timeout: ${ORIGINATION_QUOTE_API_TIMEOUT:3s}
    consul:
      enabled: ${SPARK_ORIGINATION_CONSUL_ENABLED:false}
      url: ${SPARK_ORIGINATION_CONSUL_URL:http://localhost:8500}
      service-name: ${SPARK_ORIGINATION_CONSUL_SERVICE_NAME:origination-api}
      service-address: ${SPARK_ORIGINATION_CONSUL_SERVICE_ADDRESS:127.0.0.1}
      http-port: ${SPARK_ORIGINATION_CONSUL_HTTP_PORT:8080}
      grpc-port: ${SPARK_ORIGINATION_CONSUL_GRPC_PORT:9090}
      health-check-url: ${SPARK_ORIGINATION_CONSUL_HEALTH_CHECK_URL:}
      health-check-path: ${SPARK_ORIGINATION_CONSUL_HEALTH_CHECK_PATH:/ready}
